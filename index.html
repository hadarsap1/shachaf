<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="192x192" href="/logo.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>שחף — פלטפורמת קליטה</title>

    <!-- PWA -->
    <meta name="theme-color" content="#2563EB" />
    <meta name="description" content="פלטפורמת קליטה למשפחות בבית ספר שחף" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="שחף" />
    <link rel="apple-touch-icon" href="/logo.png" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      // SW rescue: if the app fails to mount (stale/broken service worker cache),
      // unregister all SWs, wipe caches, and reload once.
      setTimeout(function () {
        var root = document.getElementById('root')
        if (root && root.children.length > 0) return
        if (sessionStorage.getItem('sw_rescue')) return
        sessionStorage.setItem('sw_rescue', '1')
        var done = function () { location.reload() }
        Promise.all([
          'serviceWorker' in navigator
            ? navigator.serviceWorker.getRegistrations().then(function (rs) {
                return Promise.all(rs.map(function (r) { return r.unregister() }))
              })
            : Promise.resolve(),
          'caches' in window
            ? caches.keys().then(function (ks) {
                return Promise.all(ks.map(function (k) { return caches.delete(k) }))
              })
            : Promise.resolve(),
        ]).then(done, done)
      }, 6000)
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
